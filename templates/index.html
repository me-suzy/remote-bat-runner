<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0f172a">
<title>{{ title }}</title>
<link rel="manifest" href="/static/manifest.webmanifest">
<link rel="apple-touch-icon" href="/static/icon-192.png">
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; height: 100%; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: radial-gradient(circle at 30% 20%, #1e3a8a, #0f172a 70%);
    color: #f8fafc;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: 24px; gap: 22px;
  }
  h1 { margin: 0; font-size: 22px; opacity: .9; letter-spacing: .5px; }
  button {
    width: 240px; height: 240px; border-radius: 50%;
    border: none; cursor: pointer;
    background: linear-gradient(145deg, #22c55e, #15803d);
    color: white; font-size: 28px; font-weight: 700;
    box-shadow: 0 20px 40px rgba(34,197,94,.35), inset 0 -6px 12px rgba(0,0,0,.25);
    transition: transform .08s ease;
  }
  button:active { transform: scale(.96); }
  button[disabled] { filter: grayscale(.6) brightness(.7); cursor: wait; }
  #status { min-height: 28px; font-size: 16px; text-align: center; opacity: .85; }
  .ok { color: #4ade80; } .err { color: #f87171; }
  small { opacity: .5; font-size: 12px; }
  a.secondary {
    color: #93c5fd; text-decoration: none; border: 1px solid rgba(147,197,253,.4);
    padding: 10px 18px; border-radius: 10px; font-size: 14px;
  }
</style>
</head>
<body>
  <h1>{{ title }}</h1>
  <button id="go">RUN</button>
  <div id="status"></div>
  {% if files_enabled %}
    <a class="secondary" href="/files?k={{ secret|urlencode }}">Recent files →</a>
  {% endif %}
  <small>Tap to trigger the .bat on your laptop</small>

<script>
  const SECRET = {{ secret|tojson }};
  const btn = document.getElementById("go");
  const status = document.getElementById("status");

  btn.addEventListener("click", async () => {
    btn.disabled = true;
    status.className = "";
    status.textContent = "Sending...";
    try {
      const r = await fetch("/run?k=" + encodeURIComponent(SECRET), { method: "POST" });
      const j = await r.json();
      if (j.ok) {
        status.className = "ok";
        status.textContent = "Started on laptop";
      } else {
        status.className = "err";
        status.textContent = "Error: " + (j.error || "unknown");
      }
    } catch (e) {
      status.className = "err";
      status.textContent = "Network: " + e.message;
    } finally {
      setTimeout(() => { btn.disabled = false; }, 1500);
    }
  });
</script>
</body>
</html>
